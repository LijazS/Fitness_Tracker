apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: fitness-route
  namespace: l-ns
spec:
  parentRefs:
    - name: new-gateway
      namespace: default
  rules:
    - matches: 
        - path: 
            type: PathPrefix 
            value: /
      backendRefs:
        - name: fitness-tracker-service
          port: 5000 