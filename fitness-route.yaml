apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: fitness-route
  namespace: l-ns
spec:
  parentRefs:
    - name: new-gateway
      namespace: default
  rules:
    - matches: 
        - path: 
            type: PathPrefix 
            value: /fitness
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: fitness-service
          port: 80   